<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    @keyframes ping-slow{0%{transform:scale(1);opacity:1}100%{transform:scale(1.6);opacity:0}}
    .animate-ping-slow{animation:ping-slow 1.2s cubic-bezier(0,0,0.2,1) infinite}
    
    @keyframes messageAppear {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(0.95);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .message-animation {
      animation: messageAppear 0.3s ease-out forwards;
    }
  </style>
</head>
<body class="bg-gray-100 h-screen">
  <div class="max-w-md mx-auto bg-white h-full shadow-lg flex flex-col" x-data="chatComponent()">
    <!-- Header -->
    <header class="flex items-center justify-between px-4 py-4 border-b bg-white/95 backdrop-blur sticky top-0 z-10">
      <div class="flex items-center">
        <h1 class="text-lg font-semibold text-gray-800">Travel Assistant</h1>
        <span x-show="typing" class="ml-2 w-2.5 h-2.5 bg-lime-600 rounded-full animate-ping-slow"></span>
      </div>
      <div class="flex items-center gap-2">
        <button @click="clearChat()" 
                class="text-gray-500 hover:text-gray-700 p-2 rounded-full hover:bg-gray-100 transition-colors"
                x-show="messages.length > 0"
                title="Clear chat history">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
        <button class="text-gray-500 hover:text-gray-700 p-2 rounded-full hover:bg-gray-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Thread -->
    <div id="thread" class="flex-1 overflow-y-auto px-4 py-4 space-y-4 bg-gray-50">
      <!-- Welcome message when no messages -->
      <template x-if="messages.length===0">
        <div class="space-y-6">
          <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
            <h3 class="font-medium text-gray-800 mb-2">Welcome to your Travel Assistant!</h3>
            <p class="text-sm text-gray-600 mb-3">I can help you discover the best experiences in Barbados. What would you like to know?</p>
            <div class="flex flex-wrap gap-2">
              <template x-for="q in quickActions" :key="q">
                <button @click="draft=q; send()" 
                        class="px-4 py-2 bg-lime-100 text-lime-700 rounded-full text-xs font-medium hover:bg-lime-200 transition-colors"
                        x-text="q"></button>
              </template>
            </div>
          </div>
          
          <!-- Popular questions -->
          <div>
            <h4 class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-3">Popular Questions</h4>
            <div class="space-y-2">
              <button @click="draft='What are the best beaches to visit?'; send()" 
                      class="w-full text-left px-4 py-3 bg-white rounded-lg border border-gray-200 text-sm text-gray-700 hover:bg-gray-50 transition-colors flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-lime-500 mr-2 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                What are the best beaches to visit?
              </button>
              <button @click="draft='How do I get around the island?'; send()" 
                      class="w-full text-left px-4 py-3 bg-white rounded-lg border border-gray-200 text-sm text-gray-700 hover:bg-gray-50 transition-colors flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-lime-500 mr-2 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                How do I get around the island?
              </button>
              <button @click="draft='What local foods should I try?'; send()" 
                      class="w-full text-left px-4 py-3 bg-white rounded-lg border border-gray-200 text-sm text-gray-700 hover:bg-gray-50 transition-colors flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-lime-500 mr-2 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                What local foods should I try?
              </button>
            </div>
          </div>
        </div>
      </template>

      <!-- Message bubbles -->
      <template x-for="msg in messages" :key="msg.id">
        <div :class="msg.role==='user' ? 'flex justify-end' : 'flex justify-start'" class="message-animation">
          <!-- Assistant avatar for bot messages -->
          <div x-show="msg.role!=='user'" class="w-8 h-8 rounded-full bg-lime-100 flex-shrink-0 flex items-center justify-center mr-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-lime-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
            </svg>
          </div>
          
          <!-- Message bubble -->
          <div :class="msg.role==='user'
                      ? 'bg-lime-600 text-white rounded-2xl rounded-tr-sm'
                      : 'bg-white text-gray-800 rounded-2xl rounded-tl-sm border border-gray-200'"
               class="px-4 py-3 max-w-[75%] text-sm shadow-sm"
               style="white-space: pre-wrap; word-break: break-word;">
            <p x-text="msg.text"></p>
          </div>
          
          <!-- User avatar for user messages -->
          <div x-show="msg.role==='user'" class="w-8 h-8 rounded-full bg-gray-200 flex-shrink-0 flex items-center justify-center ml-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </div>
        </div>
      </template>
    </div>

    <!-- Input bar -->
    <form @submit.prevent="send()" class="border-t px-4 py-3 flex gap-2 bg-white shadow-sm">
      <textarea x-model="draft" 
                placeholder="Type a message…"
                class="flex-1 resize-none bg-gray-100 border-none rounded-full py-3 px-4 text-sm focus:ring-2 focus:ring-lime-400 min-h-[44px] max-h-[120px]"
                @keydown.enter.prevent="if(!$event.shiftKey) send()"
                @input="$el.style.height = '44px'; $el.style.height = ($el.scrollHeight > 120 ? 120 : $el.scrollHeight) + 'px'"></textarea>
      <button type="submit"
              :disabled="!draft.trim()"
              class="bg-lime-500 text-white p-3 rounded-full flex items-center justify-center disabled:opacity-40 hover:bg-lime-600 transition-colors shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
        </svg>
      </button>
    </form>
  </div>

  <script>
    function chatComponent() {
      return {
        messages: [],
        draft: '',
        typing: false,
        id: 0,
        quickActions: ['Find beaches', 'Events tonight', 'Budget tours', 'My favourites'],

        init() {
          // Load messages from localStorage
          const savedMessages = localStorage.getItem('chat-test-messages');
          if (savedMessages) {
            try {
              const parsed = JSON.parse(savedMessages);
              this.messages = parsed.messages || [];
              this.id = parsed.lastId || 0;

              // Scroll to bottom on init after a short delay to ensure DOM is ready
              setTimeout(() => this.scroll(), 100);
            } catch (e) {
              console.error('Error loading saved messages:', e);
            }
          }
        },

        saveMessages() {
          // Save messages to localStorage
          localStorage.setItem('chat-test-messages', JSON.stringify({
            messages: this.messages,
            lastId: this.id
          }));
        },

        async send() {
          if (!this.draft.trim()) return;

          // Add user message
          this.messages.push({
            id: ++this.id,
            role: 'user',
            text: this.draft.trim(),
            timestamp: new Date().toISOString()
          });

          // Save to localStorage
          this.saveMessages();

          // Scroll to bottom
          this.$nextTick(() => this.scroll());

          // Prepare for assistant response
          const prompt = this.draft;
          this.draft = '';
          this.typing = true;

          // Simulate API call (in production, this would be a real API call)
          try {
            // Simulate network delay
            await new Promise(resolve => setTimeout(resolve, 1000));

            // For demo purposes, generate a simple response based on the prompt
            let reply = "I'm sorry, I don't have information about that yet. As your travel assistant, I'm still learning about Barbados.";

            if (prompt.toLowerCase().includes('beach')) {
              reply = "Barbados has some amazing beaches! Crane Beach is known for its pink-tinged sand and crystal clear waters. Carlisle Bay is great for swimming and water sports. Bottom Bay is a picturesque spot with dramatic cliffs.";
            } else if (prompt.toLowerCase().includes('food') || prompt.toLowerCase().includes('eat')) {
              reply = "You must try Barbadian cuisine! Don't miss flying fish and cou-cou (the national dish), fish cakes, macaroni pie, and pudding and souse. Oistins Fish Fry on Friday nights is a must-visit for fresh seafood and local atmosphere.";
            } else if (prompt.toLowerCase().includes('transport') || prompt.toLowerCase().includes('get around')) {
              reply = "You can get around Barbados by:\n- Renting a car (they drive on the left)\n- Taking public buses (blue or yellow buses)\n- Hiring taxis (agree on fare before departure)\n- Joining organized tours for specific attractions";
            } else if (prompt.toLowerCase().includes('event') || prompt.toLowerCase().includes('tonight')) {
              reply = "Tonight in Barbados:\n- Live Reggae at Harbor Lights (8PM-1AM)\n- Sunset Catamaran Cruise (5:30PM)\n- Rum Tasting Tour at Mount Gay Distillery (last tour at 4PM)\n- Beach BBQ at Copacabana Beach Club (7PM)";
            } else if (prompt.toLowerCase().includes('budget') || prompt.toLowerCase().includes('cheap')) {
              reply = "Budget-friendly activities in Barbados:\n- Visit public beaches (all beaches are free)\n- Take the public bus around the island ($1-2 USD)\n- Explore Bridgetown's historic sites\n- Attend the Oistins Fish Fry on Friday (affordable local food)\n- Hike the Barbados National Trust trails";
            } else if (prompt.toLowerCase().includes('favourite') || prompt.toLowerCase().includes('favorite')) {
              reply = "Based on your preferences, you might enjoy:\n- Crane Beach for swimming\n- Harrison's Cave for exploration\n- St. Nicholas Abbey for history\n- Oistins Fish Fry for local cuisine\n- Animal Flower Cave for natural beauty";
            }

            // Add assistant response
            this.messages.push({
              id: ++this.id,
              role: 'bot',
              text: reply,
              timestamp: new Date().toISOString()
            });
          } catch (error) {
            // Handle error
            this.messages.push({
              id: ++this.id,
              role: 'bot',
              text: 'Sorry, I encountered a network error. Please try again later.',
              timestamp: new Date().toISOString()
            });
          } finally {
            // Update UI and save
            this.typing = false;
            this.saveMessages();
            this.$nextTick(() => this.scroll());
          }
        },

        scroll() {
          const el = document.getElementById('thread');
          if (el) el.scrollTop = el.scrollHeight;
        },

        // Clear chat history
        clearChat() {
          if (confirm('Are you sure you want to clear your chat history?')) {
            this.messages = [];
            this.id = 0;
            localStorage.removeItem('chat-test-messages');
          }
        }
      };
    }
  </script>
</body>
</html>
