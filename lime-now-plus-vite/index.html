<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#84cc16">
  <meta name="description" content="Don't just visit. Lime like a local.">
  <title>Lime Now Plus</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.webmanifest">
  <link href="/css/styles.css" rel="stylesheet">
  <script type="module" src="/src/js/app.js"></script>
</head>
<body class="h-full bg-gray-100 dark:bg-gray-900">
  <div x-data="app" x-init="init()" class="w-[360px] h-[640px] bg-white border border-lime-200 rounded-3xl shadow-2xl p-5 relative overflow-hidden mx-auto my-0">
    <!-- Toast notification -->
    <div x-show="showNotification" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 transform translate-y-2"
         x-transition:enter-end="opacity-100 transform translate-y-0"
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="opacity-100 transform translate-y-0"
         x-transition:leave-end="opacity-0 transform translate-y-2"
         class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 bg-lime-500 text-white px-4 py-2 rounded-lg shadow-lg flex items-center space-x-2"
         role="alert"
         aria-live="assertive">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
      </svg>
      <span x-text="notificationMessage"></span>
    </div>
    
    <!-- Dark mode toggle -->
    <button @click="toggleDarkMode()" class="fixed bottom-4 right-4 bg-gray-200 dark:bg-gray-700 p-2 rounded-full shadow-lg z-50" aria-label="Toggle dark mode">
      <svg x-show="!isDarkMode" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
      </svg>
      <svg x-show="isDarkMode" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-yellow-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
    </button>

    <!-- Splash Screen -->
    <template x-if="view === 'splash'">
      <div class="flex-1 flex flex-col justify-center items-center p-4 fade-in">
        <div class="w-24 h-24 rounded-full bg-lime-400 flex items-center justify-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
          </svg>
        </div>
        <div class="text-center font-bold text-3xl tracking-tight text-lime-800">LIME NOW<span class="text-lime-500">+</span></div>
        <div class="text-center text-gray-600 italic px-8 mt-2">"Don't just visit. Lime like a local."</div>
        <div class="w-16 h-1 bg-lime-400 rounded-full my-4"></div>
        <p class="text-center text-gray-600 text-sm px-8 mb-6">Discover authentic local experiences, hidden gems, and connect with locals who know best.</p>
        <button @click="showView('login')" class="bg-lime-500 hover:bg-lime-600 text-white py-3 px-8 rounded-full font-medium shadow-lg transform transition hover:scale-105 w-3/4 mt-4 pulse-on-hover">Get Started</button>
      </div>
    </template>

    <!-- Login Screen -->
    <template x-if="view === 'login'">
      <div class="flex-1 flex flex-col justify-center p-4 fade-in">
        <div class="flex justify-center mb-2">
          <div class="w-12 h-12 rounded-full bg-lime-400 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
            </svg>
          </div>
        </div>
        <h2 class="text-2xl font-semibold text-center text-gray-800 dark:text-white">Welcome Back</h2>
        <div class="px-6 space-y-4 mt-4">
          <div class="relative">
            <input type="email" x-model="email" placeholder="Email" class="w-full border border-gray-300 p-3 rounded-lg pl-10 focus:outline-none focus:ring-2 focus:ring-lime-400 focus:border-transparent" aria-label="Email address" />
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 absolute left-3 top-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
          </div>
          <div class="relative">
            <input type="password" x-model="password" placeholder="Password" class="w-full border border-gray-300 p-3 rounded-lg pl-10 focus:outline-none focus:ring-2 focus:ring-lime-400 focus:border-transparent" aria-label="Password" />
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 absolute left-3 top-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <div class="text-right">
            <a href="#" class="text-lime-600 text-sm hover:underline">Forgot password?</a>
          </div>
          <button @click="login()" class="w-full bg-lime-500 hover:bg-lime-600 text-white py-3 rounded-lg font-medium shadow-md transition duration-200 pulse-on-hover">Sign In</button>
          <div class="flex items-center justify-center space-x-2 my-3">
            <div class="h-px bg-gray-300 w-full"></div>
            <div class="text-gray-500 text-sm whitespace-nowrap px-2">or continue with</div>
            <div class="h-px bg-gray-300 w-full"></div>
          </div>
          <div class="flex space-x-3">
            <button class="flex-1 border border-gray-300 py-2.5 rounded-lg flex items-center justify-center space-x-2 hover:bg-gray-50 transition duration-200">
              <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
            </button>
            <button class="flex-1 border border-gray-300 py-2.5 rounded-lg flex items-center justify-center space-x-2 hover:bg-gray-50 transition duration-200">
              <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.24 1.8-1.62 3.25-2.38 3.83zM13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
              </svg>
              <span class="text-sm font-medium">Apple</span>
            </button>
          </div>
        </div>
        <div class="text-center text-gray-600 text-sm mt-6 dark:text-gray-400">
          Don't have an account? <a href="#" class="text-lime-600 font-medium hover:underline">Sign up</a>
        </div>
      </div>
    </template>

    <!-- Main Content -->
    <template x-if="['dashboard', 'explore', 'chat', 'profile'].includes(view)">
      <div class="flex-1 overflow-y-auto pb-16">
        <!-- Dashboard -->
        <div x-show="view === 'dashboard'" x-cloak class="h-full flex flex-col phone-container fade-in" id="dashboard-container">
          <header class="flex justify-between items-center px-6 pt-8 pb-4">
            <h1 class="text-xl font-bold text-lime-800">Dashboard</h1>
            <div class="flex space-x-2">
              <button class="bg-lime-100 p-2 rounded-full hover:bg-lime-200 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-lime-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
                </svg>
              </button>
              <button class="bg-lime-100 p-2 rounded-full hover:bg-lime-200 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-lime-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.4 2.757a.5.5 0 01.145.572l-.433.868a.5.5 0 01-.572.145L15 11.757V16h-2v-4.243l-4.4 2.586a.5.5 0 01-.572-.145l-.433-.868a.5.5 0 01-.145-.572L9 10l-4.4-2.757a.5.5 0 01-.145-.572l.433-.868a.5.5 0 01.572-.145L9 7.243V3h2v4.243l4.4-2.586a.5.5 0 01.572.145l.433.868a.5.5 0 01.145.572L15 9l4.4 2.757zM10 15a2 2 0 104 0 2 2 0 00-4 0z" />
                </svg>
              </button>
            </div>
          </header>
          <div class="flex-1 overflow-auto px-6 main-content">
            <div class="mb-6 bg-gradient-to-r from-lime-400 to-lime-600 rounded-xl p-6 text-white shadow-md">
              <h2 class="text-2xl font-bold mb-2">Welcome to Lime Now+</h2>
              <p class="mb-4">Discover authentic local experiences and hidden gems in Barbados.</p>
              <button @click="view = 'explore'" class="bg-white text-lime-600 py-2 px-4 rounded-lg font-medium hover:bg-gray-100 transition duration-200">Explore Now</button>
            </div>
            <h2 class="text-lg font-semibold text-gray-800 mb-3">Your Favorites</h2>
            <div class="grid grid-cols-2 gap-3 mb-6" x-show="favorites.length > 0">
              <template x-for="favorite in favorites" :key="favorite.id">
                <div class="bg-lime-50 rounded-xl p-4 h-40 flex flex-col justify-end relative overflow-hidden">
                  <img :src="favorite.image" :alt="favorite.name" class="absolute inset-0 w-full h-full object-cover" />
                  <div class="absolute inset-0 bg-gradient-to-t from-lime-800/50 to-transparent"></div>
                  <h3 class="font-medium text-white text-lg relative z-10" x-text="favorite.name"></h3>
                  <p class="text-white/80 text-xs relative z-10" x-text="favorite.experiences + ' experiences'"></p>
                  <button @click="toggleFavorite(favorite)" class="absolute top-2 right-2 bg-white/20 p-1 rounded-full text-white hover:bg-white/30 z-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                      <path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" />
                    </svg>
                  </button>
                </div>
              </template>
            </div>
            <div class="text-center text-gray-600 py-8" x-show="favorites.length === 0">
              <p>You haven't added any favorites yet.</p>
              <button @click="view = 'explore'" class="mt-2 bg-lime-500 hover:bg-lime-600 text-white py-2 px-4 rounded-lg font-medium shadow-md transition duration-200">Explore Destinations</button>
            </div>
            <h2 class="text-lg font-semibold text-gray-800 mb-3">Recent Activity</h2>
            <div class="bg-white rounded-xl p-4 shadow-sm" x-show="recentActivity.length > 0">
              <ul class="space-y-3">
                <template x-for="activity in recentActivity" :key="activity.id">
                  <li class="flex items-center space-x-3 border-b border-gray-100 pb-2 last:border-b-0 last:pb-0">
                    <div class="w-8 h-8 rounded-full bg-lime-100 flex items-center justify-center flex-shrink-0">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-lime-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" x-show="activity.type === 'search'">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                      </svg>
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-lime-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" x-show="activity.type === 'chat'">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16L8 17l-1-1" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h18M3 8h18M3 11h18" />
                      </svg>
                    </div>
                    <div class="flex-1">
                      <p class="font-medium text-gray-800" x-text="activity.title"></p>
                      <p class="text-xs text-gray-500" x-text="activity.time"></p>
                    </div>
                  </li>
                </template>
              </ul>
            </div>
            <div class="text-center text-gray-600 py-4" x-show="recentActivity.length === 0">
              <p>No recent activity.</p>
            </div>
          </div>
        </div>

        <!-- Explore View -->
        <template x-if="view === 'explore'">
          <div class="h-full flex flex-col fade-in">
            <header class="flex justify-between items-center px-6 pt-8 pb-4">
              <h1 class="text-xl font-bold text-lime-800 dark:text-lime-200">Explore Barbados</h1>
              <button class="explore-hamburger bg-lime-100 dark:bg-lime-900 p-2 rounded-full hover:bg-lime-200 dark:hover:bg-lime-800 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-lime-600 dark:text-lime-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
                </svg>
              </button>
            </header>
            
            <div class="px-6 mb-4">
              <div class="relative">
                <input type="text" placeholder="Search locations..." class="w-full bg-gray-100 dark:bg-gray-800 border-none rounded-full py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-lime-400 dark:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 absolute left-3 top-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
              </div>
            </div>
            
            <div class="flex-1 overflow-auto px-6 main-content">
              <h2 class="text-lg font-semibold text-gray-800 dark:text-white mb-3">Popular Destinations</h2>
              <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-lime-50 dark:bg-lime-900 rounded-xl p-4 h-40 flex flex-col justify-end relative overflow-hidden">
                  <img src="https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1000&q=80" class="absolute inset-0 w-full h-full object-cover" alt="Crane Beach" />
                  <div class="absolute inset-0 bg-gradient-to-t from-lime-800/50 to-transparent"></div>
                  <h3 class="font-medium text-white text-lg relative z-10">Crane Beach</h3>
                  <p class="text-white/80 text-xs relative z-10">28 experiences</p>
                </div>
                <div class="bg-lime-50 dark:bg-lime-900 rounded-xl p-4 h-40 flex flex-col justify-end relative overflow-hidden">
                  <img src="https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1000&q=80" class="absolute inset-0 w-full h-full object-cover" alt="Bridgetown" />
                  <div class="absolute inset-0 bg-gradient-to-t from-lime-800/50 to-transparent"></div>
                  <h3 class="font-medium text-white text-lg relative z-10">Bridgetown</h3>
                  <p class="text-white/80 text-xs relative z-10">42 experiences</p>
                </div>
                <div class="bg-lime-50 dark:bg-lime-900 rounded-xl p-4 h-40 flex flex-col justify-end relative overflow-hidden">
                  <img src="https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1000&q=80" class="absolute inset-0 w-full h-full object-cover" alt="Oistins" />
                  <div class="absolute inset-0 bg-gradient-to-t from-lime-800/50 to-transparent"></div>
                  <h3 class="font-medium text-white text-lg relative z-10">Oistins</h3>
                  <p class="text-white/80 text-xs relative z-10">35 experiences</p>
                </div>
                <div class="bg-lime-50 dark:bg-lime-900 rounded-xl p-4 h-40 flex flex-col justify-end relative overflow-hidden">
                  <img src="https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1000&q=80" class="absolute inset-0 w-full h-full object-cover" alt="Speightstown" />
                  <div class="absolute inset-0 bg-gradient-to-t from-lime-800/50 to-transparent"></div>
                  <h3 class="font-medium text-white text-lg relative z-10">Speightstown</h3>
                  <p class="text-white/80 text-xs relative z-10">23 experiences</p>
                </div>
              </div>
            </div>
          </div>
        </template>

        <!-- Chat View -->
        <template x-if="view === 'chat'">
          <div class="p-4 flex flex-col h-full fade-in">
            <header class="flex justify-between items-center mb-4">
              <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-full bg-lime-100 flex items-center justify-center">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-lime-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                  </svg>
                </div>
                <div>
                  <h1 class="text-lg font-bold text-lime-800 dark:text-lime-200">AI Tour Guide</h1>
                  <p class="text-xs text-gray-500 dark:text-gray-400">Ask me anything about Barbados!</p>
                </div>
              </div>
            </header>
            <div id="chat-messages" class="flex-1 overflow-y-auto space-y-4 mb-4">
              <div class="flex items-start space-x-2">
                <div class="w-8 h-8 rounded-full bg-lime-100 flex items-center justify-center flex-shrink-0">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-lime-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                  </svg>
                </div>
                <div class="bg-lime-50 dark:bg-gray-700 rounded-2xl rounded-tl-none px-4 py-2 max-w-[80%]">
                  <p class="text-gray-800 dark:text-white">Hello! I'm your AI tour guide for Barbados. I can help you discover the best places to visit, local experiences, and hidden gems. What would you like to know about Barbados?</p>
                </div>
              </div>
              <template x-for="(message, index) in chatMessages" :key="index">
                <div :class="message.type === 'user' ? 'ml-auto bg-lime-500 text-white' : 'mr-auto bg-gray-200 dark:bg-gray-700 dark:text-white'"
                     class="max-w-[80%] rounded-lg p-3 flex items-start space-x-2">
                  <div x-show="message.type !== 'user'" class="w-8 h-8 rounded-full bg-lime-100 flex items-center justify-center flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-lime-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                    </svg>
                  </div>
                  <p x-text="message.content"></p>
                </div>
              </template>
            </div>
            <div class="mt-4 flex gap-2 border-t border-gray-200 dark:border-gray-700 pt-4">
              <div class="relative flex-1">
                <input type="text" x-model="chatMessage" @keyup.enter="sendMessage()"
                       class="flex-1 p-2 rounded border dark:bg-gray-800 dark:text-white w-full bg-gray-100 border-none rounded-full py-3 pl-4 pr-12 focus:outline-none focus:ring-2 focus:ring-lime-400"
                       placeholder="Ask about places, food, culture...">
                <button @click="sendMessage()" 
                        class="absolute right-2 top-1/2 transform -translate-y-1/2 bg-lime-500 text-white p-2 rounded-full hover:bg-lime-600 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </template>

        <!-- Profile View -->
        <div x-show="view === 'profile'" x-cloak class="h-full flex flex-col phone-container fade-in">
          <header class="flex justify-between items-center px-6 pt-8 pb-4">
            <h1 class="text-xl font-bold text-lime-800">My Profile</h1>
            <button class="bg-lime-100 p-2 rounded-full hover:bg-lime-200 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-lime-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317C10.751 2.561 13.249 2.561 13.675 4.317c.114.519.282 1.019.469 1.496.271.543.57 1.055.904 1.518 1.33 1.84 3.847 2.608 5.687 1.276a18.52 18.52 0 011.496-.469 5.106 5.106 0 013.182 3.182c-.431 1.55-1.207 2.966-2.246 4.076-1.353 1.441-3.094 2.228-4.956 2.228-2.134 0-4.179-.999-5.452-2.761-1.127-1.558-1.788-3.491-1.788-5.452 0-1.862.786-3.603 2.228-4.956.156-.147.31-.29.469-.431zM8 14h0" />
              </svg>
            </button>
          </header>
          
          <div class="flex-1 overflow-auto px-6 py-4">
            <div class="flex flex-col items-center mb-6">
              <div class="w-24 h-24 rounded-full bg-lime-400 flex items-center justify-center mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
              </div>
              <h2 class="text-lg font-semibold text-gray-800">User Name</h2>
              <p class="text-gray-500 text-sm">Joined recently</p>
            </div>
            
            <div class="space-y-4">
              <div class="bg-lime-50 dark:bg-gray-700 rounded-xl p-4">
                <h3 class="font-medium text-gray-800 dark:text-white mb-2">Account Settings</h3>
                <div class="space-y-2">
                  <button class="w-full text-left flex items-center justify-between hover:bg-lime-100 dark:hover:bg-gray-600 rounded-lg p-2 transition-colors">
                    <div class="flex items-center space-x-3">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-lime-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                      </svg>
                      <span class="text-gray-800 dark:text-white">Personal Information</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                  </button>
                  <button class="w-full text-left flex items-center justify-between hover:bg-lime-100 dark:hover:bg-gray-600 rounded-lg p-2 transition-colors">
                    <div class="flex items-center space-x-3">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-lime-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                      </svg>
                      <span class="text-gray-800 dark:text-white">Security</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                  </button>
                </div>
              </div>
              
              <div class="bg-lime-50 dark:bg-gray-700 rounded-xl p-4">
                <h3 class="font-medium text-gray-800 dark:text-white mb-2">Preferences</h3>
                <div class="space-y-2">
                  <button class="w-full text-left flex items-center justify-between hover:bg-lime-100 dark:hover:bg-gray-600 rounded-lg p-2 transition-colors">
                    <div class="flex items-center space-x-3">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-lime-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v12" />
                      </svg>
                      <span class="text-gray-800 dark:text-white">Interests</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                  </button>
                  <button class="w-full text-left flex items-center justify-between hover:bg-lime-100 dark:hover:bg-gray-600 rounded-lg p-2 transition-colors">
                    <div class="flex items-center space-x-3">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-lime-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8a2 2 0 012-2h5v2H5v10h14v-6h2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 3h-5v2h5v5h2V5a2 2 0 00-2-2z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9l4-4" />
                      </svg>
                      <span class="text-gray-800 dark:text-white">Notifications</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                  </button>
                </div>
              </div>
              
              <div class="bg-lime-50 dark:bg-gray-700 rounded-xl p-4">
                <h3 class="font-medium text-gray-800 dark:text-white mb-2">Activity</h3>
                <div class="space-y-2">
                  <button class="w-full text-left flex items-center justify-between hover:bg-lime-100 dark:hover:bg-gray-600 rounded-lg p-2 transition-colors">
                    <div class="flex items-center space-x-3">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-lime-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                      </svg>
                      <span class="text-gray-800 dark:text-white">Favorites</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                  </button>
                  <button class="w-full text-left flex items-center justify-between hover:bg-lime-100 dark:hover:bg-gray-600 rounded-lg p-2 transition-colors">
                    <div class="flex items-center space-x-3">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-lime-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                      </svg>
                      <span class="text-gray-800 dark:text-white">Recent Activity</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- Navigation Bar -->
    <div class="app-navigation absolute bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 backdrop-blur-sm z-40 pb-safe px-safe">
      <div class="flex justify-around items-center h-16 max-w-lg mx-auto">
        <button @click="view = 'dashboard'" class="flex flex-col items-center justify-center space-y-1 menu-item" :class="{'text-lime-500': view === 'dashboard'}">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12a9 9 0 1118 0 9 9 0 01-18 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l-1.5-1.5" />
          </svg>
          <span class="text-xs">Home</span>
        </button>
        <button @click="view = 'explore'" class="flex flex-col items-center justify-center space-y-1 menu-item" :class="{'text-lime-500': view === 'explore'}">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span class="text-xs">Explore</span>
        </button>
        <button @click="view = 'chat'" class="flex flex-col items-center justify-center space-y-1 menu-item" :class="{'text-lime-500': view === 'chat'}">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16L5 12l-4 4 4 4 4-4m5.06-8.94a10 10 0 11-1.41 1.41l-2.12-2.12a6 6 0 10-1.41 1.41l-2.12-2.12z" />
          </svg>
          <span class="text-xs">Chat</span>
        </button>
        <button @click="view = 'profile'" class="flex flex-col items-center justify-center space-y-1 menu-item" :class="{'text-lime-500': view === 'profile'}">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          <span class="text-xs">Profile</span>
        </button>
      </div>
    </div>
  </div>
</body>
</html>
