<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#84cc16">
  <meta name="description" content="Don't just visit. Lime like a local.">
  <title>Lime Now+</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.webmanifest">
</head>
<body class="flex justify-center bg-lime-50 overflow-x-hidden min-h-screen font-sans">
  <div x-data="app" x-init="init()">
    <!-- Phone Frame (scroll container) -->
    <div id="phone" class="relative w-[340px] h-[640px] rounded-3xl overflow-hidden shadow-xl bg-white">
      <!-- Status Bar -->
      <div class="absolute top-0 left-0 right-0 flex justify-between items-center px-6 py-2 text-xs text-gray-700 bg-white bg-opacity-80 backdrop-blur-sm z-10">
        <div x-text="currentTime"></div>
        <div class="flex space-x-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h8m-8 5h8m-8 5h8" />
          </svg>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
          </svg>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
      </div>
    <div x-data="{view: 'dashboard'}">

    <!-- Toast notification -->
    <div x-show="showNotification"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 transform translate-y-2"
         x-transition:enter-end="opacity-100 transform translate-y-0"
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="opacity-100 transform translate-y-0"
         x-transition:leave-end="opacity-0 transform translate-y-2"
         class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 bg-lime-500 text-white px-4 py-2 rounded-lg shadow-lg flex items-center space-x-2"
         role="alert"
         aria-live="assertive">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
      </svg>
      <span x-text="notificationMessage || 'Added to favorites!'"></span>
    </div>

    <!-- Dark mode toggle -->
    <button @click="toggleDarkMode()" class="fixed bottom-4 right-4 bg-gray-200 dark:bg-gray-700 p-2 rounded-full shadow-lg z-50" aria-label="Toggle dark mode">
      <svg x-show="!darkMode" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
      </svg>
      <svg x-show="darkMode" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-yellow-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
    </button>

    <!-- App Views - each view will be a separate component -->

    <!-- Splash Screen -->
    <div x-show="view === 'splash'" class="flex flex-col justify-center items-center h-full gap-6 pt-8 fade-in">
      <div class="w-24 h-24 rounded-full bg-lime-400 flex items-center justify-center mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
        </svg>
      </div>
      <div class="text-center font-bold text-3xl tracking-tight text-lime-800">LIME NOW<span class="text-lime-500">+</span></div>
      <div class="text-center text-gray-600 italic px-8 mt-2">"Don't just visit. Lime like a local."</div>
      <div class="w-16 h-1 bg-lime-400 rounded-full my-4"></div>
      <p class="text-center text-gray-600 text-sm px-8 mb-6">Discover authentic local experiences, hidden gems, and connect with locals who know best.</p>
      <button @click="view = 'login'" class="bg-lime-500 hover:bg-lime-600 text-white py-3 px-8 rounded-full font-medium shadow-lg transform transition hover:scale-105 w-3/4 mt-4 pulse-on-hover">Get Started</button>
    </div>

    <!-- Login / Signup -->
    <div x-show="view === 'login'" class="flex flex-col justify-center h-full gap-4 pt-10 fade-in">
      <div class="flex justify-center mb-2">
        <div class="w-12 h-12 rounded-full bg-lime-400 flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
          </svg>
        </div>
      </div>
      <h2 class="text-xl text-center font-semibold text-gray-800 mb-4">Welcome Back</h2>
      <div class="px-6 space-y-4">
        <div class="relative">
          <input type="email" x-model="email" placeholder="Email" :class="{'border-red-500': emailError}" class="w-full border border-gray-300 p-3 rounded-lg pl-10 focus:outline-none focus:ring-2 focus:ring-lime-400 focus:border-transparent" aria-label="Email address" />
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 absolute left-3 top-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
          <p x-show="emailError" x-text="emailError" class="text-red-500 text-xs mt-1"></p>
        </div>
        <div class="relative">
          <input type="password" x-model="password" placeholder="Password" :class="{'border-red-500': passwordError}" class="w-full border border-gray-300 p-3 rounded-lg pl-10 focus:outline-none focus:ring-2 focus:ring-lime-400 focus:border-transparent" aria-label="Password" />
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 absolute left-3 top-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
          <p x-show="passwordError" x-text="passwordError" class="text-red-500 text-xs mt-1"></p>
        </div>
        <div class="text-right">
          <a href="#" class="text-lime-600 text-sm hover:underline">Forgot password?</a>
        </div>
        <button @click="validateLogin()" class="w-full bg-lime-500 hover:bg-lime-600 text-white py-3 rounded-lg font-medium shadow-md transition duration-200 pulse-on-hover">Sign In</button>
        <div class="flex items-center justify-center space-x-2 my-3">
          <div class="h-px bg-gray-300 w-full"></div>
          <div class="text-gray-500 text-sm whitespace-nowrap px-2">or continue with</div>
          <div class="h-px bg-gray-300 w-full"></div>
        </div>
        <div class="flex space-x-3">
          <button class="flex-1 border border-gray-300 py-2.5 rounded-lg flex items-center justify-center space-x-2 hover:bg-gray-50 transition duration-200">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
          </button>
          <button class="flex-1 border border-gray-300 py-2.5 rounded-lg flex items-center justify-center space-x-2 hover:bg-gray-50 transition duration-200">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.24 1.8-1.62 3.25-2.38 3.83zM13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
            <span class="text-sm font-medium">Apple</span>
          </button>
        </div>
      </div>
      <div class="text-center text-gray-600 text-sm mt-6">
        Don't have an account? <a href="#" class="text-lime-600 font-medium hover:underline">Sign up</a>
      </div>
    </div>

    <!-- View Templates -->
    <template x-if="view === 'dashboard'">
      <!-- MAIN SCROLL AREA -->
      <div class="h-full overflow-y-auto pb-36 px-4 pt-8 bg-gray-50 scrollbar scrollbar-thumb-slate-300 scrollbar-track-transparent overscroll-x-none">
        <!-- Header with greeting and search -->
        <header class="mb-6">
          <div class="flex justify-between items-center mb-5">
            <div>
              <h2 class="text-xl font-bold text-gray-800 flex items-center">
                <span>Hello, </span>
                <span x-text="email ? email.split('@')[0] : 'User'" class="mx-1"></span>
                <span class="wave text-xl">👋</span>
              </h2>
              <p class="text-sm text-gray-500 mt-1">What would you like to do today?</p>
            </div>
            <div class="flex space-x-3">
              <button class="relative bg-gray-100 p-2 rounded-full hover:bg-gray-200 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
                <div class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 flex items-center justify-center rounded-full" x-show="notificationCount > 0" x-text="notificationCount"></div>
              </button>
              <div class="relative cursor-pointer" @click="tab='profile'; view = 'profile'">
                <div class="w-10 h-10 rounded-full bg-lime-100 flex items-center justify-center shadow-sm">
                  <span class="text-lime-600 font-medium" x-text="email ? email.substring(0, 2).toUpperCase() : 'U'"></span>
                </div>
              </div>
            </div>
          </div>

          <!-- Enhanced Search Bar -->
          <div class="relative">
            <input type="text" placeholder="Search experiences, places..."
                   class="w-full bg-white border border-gray-200 rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-lime-400 shadow-sm text-gray-700">
            <div class="absolute left-3 top-1/2 transform -translate-y-1/2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
            </div>
          </div>
        </header>

        <!-- CATEGORY PILLS -->
        <div class="mt-4 flex gap-3 overflow-x-auto pb-1">
          <button class="px-4 py-2 bg-lime-500 text-white rounded-full text-sm font-medium shadow-sm whitespace-nowrap flex items-center">
            <i class="lucide lucide-sparkles w-4 h-4 mr-1.5"></i>
            For You
          </button>
          <button class="px-4 py-2 bg-white text-gray-700 rounded-full text-sm font-medium shadow-sm whitespace-nowrap flex items-center">
            <i class="lucide lucide-trending-up w-4 h-4 mr-1.5 text-gray-500"></i>
            Trending
          </button>
          <button class="px-4 py-2 bg-white text-gray-700 rounded-full text-sm font-medium shadow-sm whitespace-nowrap flex items-center">
            <i class="lucide lucide-map-pin w-4 h-4 mr-1.5 text-gray-500"></i>
            Nearby
          </button>
          <button class="px-4 py-2 bg-white text-gray-700 rounded-full text-sm font-medium shadow-sm whitespace-nowrap flex items-center">
            <i class="lucide lucide-clock w-4 h-4 mr-1.5 text-gray-500"></i>
            New
          </button>

        </div>

        <!-- Quick Access Destinations -->
        <div class="mt-6 grid grid-cols-4 gap-3">
          <div class="flex flex-col items-center">
            <div class="w-14 h-14 rounded-full bg-blue-100 flex items-center justify-center mb-1.5 shadow-sm">
              <i class="lucide lucide-waves w-6 h-6 text-blue-500"></i>
            </div>
            <span class="text-xs text-gray-700">Beaches</span>
          </div>
          <div class="flex flex-col items-center">
            <div class="w-14 h-14 rounded-full bg-orange-100 flex items-center justify-center mb-1.5 shadow-sm">
              <i class="lucide lucide-hotel w-6 h-6 text-orange-500"></i>
            </div>
            <span class="text-xs text-gray-700">Hotels</span>
          </div>
          <div class="flex flex-col items-center">
            <div class="w-14 h-14 rounded-full bg-green-100 flex items-center justify-center mb-1.5 shadow-sm">
              <i class="lucide lucide-utensils w-6 h-6 text-green-500"></i>
            </div>
            <span class="text-xs text-gray-700">Food</span>
          </div>
          <div class="flex flex-col items-center">
            <div class="w-14 h-14 rounded-full bg-purple-100 flex items-center justify-center mb-1.5 shadow-sm">
              <i class="lucide lucide-ticket w-6 h-6 text-purple-500"></i>
            </div>
            <span class="text-xs text-gray-700">Events</span>
          </div>
        </div>

        <!-- My Favorites Section (if needed) -->
        <div class="mt-8 mb-6" x-show="favorites.length > 0">
          <h3 class="text-base font-semibold flex items-center gap-1">
            <i class="lucide lucide-heart w-4 h-4 text-red-500"></i> My Favorites
            <a href="#" class="ml-auto text-xs text-lime-600 flex items-center gap-0.5">
              See&nbsp;All <i class="lucide lucide-chevron-right w-3 h-3"></i>
            </a>
          </h3>

          <div class="mt-3 overflow-x-auto hide-scrollbar">
            <div class="flex space-x-4 pb-2">
              <div class="bg-white rounded-xl shadow-sm min-w-[160px] w-[160px] overflow-hidden hover:shadow-md transition-shadow" x-show="favorites.includes('reggae')">
                <div class="relative h-24">
                  <img src="https://images.unsplash.com/photo-1517457373958-b7bdd4587205?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1169&q=80" class="w-full h-full object-cover" />
                  <span class="absolute top-2 right-2 bg-white/80 backdrop-blur-sm text-red-500 w-7 h-7 rounded-full flex items-center justify-center shadow-sm">
                    <i class="lucide lucide-heart-off w-4 h-4" @click.stop="toggleFavorite('reggae')"></i>
                  </span>
                  <span class="absolute bottom-2 right-2 bg-white/90 backdrop-blur-sm text-lime-600 font-bold px-2 py-1 rounded-lg shadow-sm text-xs">$25</span>
                </div>
                <div class="p-3">
                  <h4 class="font-medium text-gray-800 text-sm">Reggae on the Beach</h4>
                  <p class="text-xs text-gray-500 mt-1.5 flex items-center">
                    <i class="lucide lucide-clock w-3 h-3 mr-1"></i>
                    Tonight, 8:00 PM
                  </p>
                </div>
              </div>

              <div class="bg-white rounded-xl shadow-sm min-w-[160px] w-[160px] overflow-hidden hover:shadow-md transition-shadow" x-show="favorites.includes('catamaran') || likedItems.includes('catamaran')">
                <div class="relative h-24">
                  <img src="https://images.unsplash.com/photo-1544551763-92ab472cad5d?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1000&q=80" class="w-full h-full object-cover" />
                  <span class="absolute top-2 right-2 bg-white/80 backdrop-blur-sm text-red-500 w-7 h-7 rounded-full flex items-center justify-center shadow-sm">
                    <i class="lucide lucide-heart-off w-4 h-4" @click.stop="toggleFavorite('catamaran')"></i>
                  </span>
                  <span class="absolute bottom-2 right-2 bg-white/90 backdrop-blur-sm text-lime-600 font-bold px-2 py-1 rounded-lg shadow-sm text-xs">$65</span>
                </div>
                <div class="p-3">
                  <h4 class="font-medium text-gray-800 text-sm">Sunset Catamaran</h4>
                  <p class="text-xs text-gray-500 mt-1.5 flex items-center">
                    <i class="lucide lucide-clock w-3 h-3 mr-1"></i>
                    Today, 5:30 PM
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- TODAY'S PICKS -->
        <section id="todays-picks" class="mt-6">
          <h3 class="text-base font-semibold flex items-center gap-1">
            <i class="lucide lucide-sparkles w-4 h-4 text-lime-500"></i> Today's Picks
            <a href="#" class="ml-auto text-xs text-lime-600 flex items-center gap-0.5">
              See&nbsp;All <i class="lucide lucide-chevron-right w-3 h-3"></i>
            </a>
          </h3>

          <!-- CARD LIST -->
          <div class="mt-3 flex flex-col gap-4" x-data="{
            picks: [
              {
                id: 'catamaran',
                title: 'Sunset Catamaran Cruise',
                image: 'https://images.unsplash.com/photo-1544551763-92ab472cad5d?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1000&q=80',
                rating: '4.9',
                duration: '2 hours',
                price: 65
              },
              {
                id: 'snorkeling',
                title: 'Snorkeling Adventure',
                image: 'https://images.unsplash.com/photo-1583296365129-6a4eee1b5de7?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1000&q=80',
                rating: '4.8',
                duration: '3 hours',
                price: 45
              },
              {
                id: 'sailing',
                title: 'Private Sailing Tour',
                image: 'https://images.unsplash.com/photo-1534254310113-b4ca3bbb5e2c?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1000&q=80',
                rating: '4.7',
                duration: '4 hours',
                price: 120
              }
            ]
          }">
            <template x-for="card in picks" :key="card.id">
              <article class="bg-white rounded-xl shadow-sm overflow-hidden relative">
                <img :src="card.image" alt="" class="h-32 w-full object-cover">
                <div class="p-4">
                  <h4 class="text-sm font-medium line-clamp-2" x-text="card.title"></h4>

                  <p class="text-xs text-slate-500 mt-1 flex items-center gap-1">
                    <i class="lucide lucide-star w-3.5 h-3.5 text-amber-400"></i>
                    <span x-text="card.rating"></span>
                    <span class="mx-1">·</span>
                    <span x-text="card.duration"></span>
                  </p>
                </div>
                <!-- price badge -->
                <span class="absolute top-2 right-2 bg-white/80 backdrop-blur text-lime-600 text-xs font-semibold rounded px-2 py-0.5">
                  $<span x-text="card.price"></span>
                </span>
              </article>
            </template>
          </div>
        </section>

        <!-- NEARBY EVENTS -->
        <section id="nearby-events" class="mt-8 pb-32">
          <h3 class="text-base font-semibold flex items-center gap-1">
            <i class="lucide lucide-map-pin w-4 h-4 text-lime-500"></i> Nearby Events

                class="absolute bottom-0 left-0 right-0 h-0.5 bg-lime-600"></span>
        </li>

        <!-- Explore -->
        <li @click="tab='explore'; view='explore'" class="relative py-2"
            :class="tab==='explore' ? 'text-lime-600' : 'text-slate-500'">
          <div class="flex flex-col items-center">
            <i class="lucide lucide-globe-2 w-5 h-5"></i>
            <span class="text-xs mt-0.5">Explore</span>
          </div>

                class="absolute bottom-0 left-0 right-0 h-0.5 bg-lime-600"></span>
        </li>

        <!-- Chat -->
        <li @click="tab='chat'; view='chat'" class="relative py-2"
            :class="tab==='chat' ? 'text-lime-600' : 'text-slate-500'">
          <div class="flex flex-col items-center">
            <i class="lucide lucide-message-circle w-5 h-5"></i>
            <span class="text-xs mt-0.5">Chat</span>
          </div>
          <span x-show="tab==='chat'"
                class="absolute bottom-0 left-0 right-0 h-0.5 bg-lime-600"></span>
        </li>

        <!-- Profile -->
        <li @click="tab='profile'; view='profile'" class="relative py-2"
            :class="tab==='profile' ? 'text-lime-600' : 'text-slate-500'">
          <div class="flex flex-col items-center">
            <i class="lucide lucide-user w-5 h-5"></i>
            <span class="text-xs mt-0.5">Profile</span>
          </div>
          <span x-show="tab==='profile'"
                class="absolute bottom-0 left-0 right-0 h-0.5 bg-lime-600"></span>
        </li>
      </ul>
    </nav>
  </div>

  <style>
    @keyframes messageAppear {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(0.95);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .message-animation {
      animation: messageAppear 0.3s ease-out forwards;
    }
  </style>

  <script>
    function logout() {
      // 1. Clear auth tokens / cookies
      localStorage.removeItem('userEmail');
      localStorage.removeItem('favorites');
      localStorage.removeItem('likedItems');
      localStorage.removeItem('chat-messages');
      localStorage.removeItem('darkMode');

      // 2. Reset the app state
      window.location.reload();
    }

    function explorePage() {

                meta: '2 hours • 4.9 ★',

              },
              {

                image: 'https://images.unsplash.com/photo-1583296365129-6a4eee1b5de7?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1000&q=80',

    function chatComponent() {
      return {
        messages: [],
        draft: '',
        isTyping: false,
        autoScrollEnabled: true,

        init() {
          // Load messages from localStorage if available
          const savedMessages = localStorage.getItem('chat-messages');
          if (savedMessages) {
            this.messages = JSON.parse(savedMessages);
          }

          // Scroll to bottom on init
          this.$nextTick(() => {
            this.scrollToBottom();
          });
        },

        sendToAI() {
          if (!this.draft.trim()) return;

          // Add user message
          this.messages.push({
            role: 'user',
            text: this.draft.trim()
          });

          // Save to localStorage
          this.saveMessages();

          // Clear input and scroll to bottom
          const message = this.draft;
          this.draft = '';
          this.scrollToBottom();

          // Reset textarea height
          const textarea = this.$el.querySelector('textarea');
          if (textarea) textarea.style.height = 'auto';

          // Simulate AI response
          this.simulateResponse(message);
        },

        simulateResponse(message) {
          // Show typing indicator
          this.isTyping = true;
          this.scrollToBottom();

          // Simulate AI thinking time (1-2 seconds)
          setTimeout(() => {
            this.isTyping = false;

            // Generate response based on message
            let response = this.generateResponse(message);

            // Add assistant message with animation flag
            this.messages.push({
              role: 'assistant',
              text: response,
              animate: true
            });

            // Save to localStorage
            this.saveMessages();

            // Scroll to bottom
            this.scrollToBottom();

            // Remove animation flag after animation completes
            setTimeout(() => {
              const lastIndex = this.messages.length - 1;
              if (lastIndex >= 0 && this.messages[lastIndex].animate) {
                this.messages[lastIndex].animate = false;
              }
            }, 500);
          }, Math.random() * 1000 + 1000);
        },

        generateResponse(message) {
          // Simple response generation logic
          message = message.toLowerCase();

          if (message.includes('beach') || message.includes('beaches')) {
            return "Here are the top beaches nearby:\n\n1. Crane Beach\n2. Bathsheba Beach\n3. Accra Beach\n\nWould you like more details about any of these?";
          } else if (message.includes('event') || message.includes('tonight')) {
            return "I found these events happening tonight:\n\n• Reggae on the Beach (8:00 PM)\n• Rum Tasting Tour (7:30 PM)\n• Jazz Night at The Cliff (9:00 PM)\n\nShall I help you book tickets for any of these?";
          } else if (message.includes('tour') || message.includes('budget')) {
            return "Here are some budget-friendly tours:\n\n• Island Safari Tour - $45\n• Catamaran Cruise - $65\n• Walking Food Tour - $30\n\nAll of these have great reviews!";
          } else if (message.includes('favourite') || message.includes('favorite')) {
            return "I've found these items in your favorites:\n\n• Sunset Catamaran Cruise\n• Reggae on the Beach\n\nWould you like to book any of these again?";
          } else {
            return "I can help you discover the best local experiences! Ask me about beaches, events, tours, restaurants, or anything else you'd like to know about.";
          }
        },

        sendQuickAction(action) {
          this.draft = action;
          this.sendToAI();
        },

        autoGrow(textarea) {
          textarea.style.height = 'auto';
          textarea.style.height = (textarea.scrollHeight) + 'px';
        },

        scrollToBottom() {
          if (!this.autoScrollEnabled) return;

          this.$nextTick(() => {
            const container = this.$refs.messageContainer;
            if (container) {
              container.scrollTop = container.scrollHeight;
            }
          });
        },

        checkScroll() {
          const container = this.$refs.messageContainer;
          if (!container) return;

          // Enable auto-scroll if user is near bottom
          const isNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 100;
          this.autoScrollEnabled = isNearBottom;
        },

        clearChat() {
          if (confirm('Are you sure you want to clear the conversation?')) {
            this.messages = [];
            localStorage.removeItem('chat-messages');
          }
        },

        saveMessages() {
          localStorage.setItem('chat-messages', JSON.stringify(this.messages));
        }
      };
    }
  </script>
